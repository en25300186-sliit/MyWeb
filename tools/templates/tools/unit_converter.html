{% extends 'base.html' %}
{% block title %}Unit Converter – EngiHub{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <h2 class="fw-bold mb-1"><i class="bi bi-arrow-left-right text-primary me-2"></i>Unit Converter</h2>
    <p class="text-muted mb-4">Convert between common engineering and everyday units.</p>

    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <form method="post" id="converterForm">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold">Category</label>
            <select name="category" id="categorySelect" class="form-select">
              <option value="length">Length</option>
              <option value="mass">Mass</option>
              <option value="temperature">Temperature</option>
              <option value="area">Area</option>
              <option value="volume">Volume</option>
              <option value="speed">Speed</option>
              <option value="pressure">Pressure</option>
              <option value="energy">Energy</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Value</label>
            <input type="number" name="value" id="valueInput" step="any" class="form-control" placeholder="Enter value" required />
          </div>
          <div class="row g-3 mb-3">
            <div class="col-6">
              <label class="form-label fw-semibold">From</label>
              <select name="from_unit" id="fromUnit" class="form-select"></select>
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold">To</label>
              <select name="to_unit" id="toUnit" class="form-select"></select>
            </div>
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg">
              <i class="bi bi-calculator me-2"></i>Convert
            </button>
          </div>
        </form>

        {% if result is not None %}
        <div class="alert alert-success mt-4 text-center fs-5">
          <i class="bi bi-check-circle me-2"></i>
          Result: <strong>{{ result|floatformat:6 }}</strong>
        </div>
        {% endif %}
      </div>
    </div>
  </div>
</div>
{% endblock %}

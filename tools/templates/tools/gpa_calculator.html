{% extends 'base.html' %}
{% block title %}GPA Calculator – EngiHub{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <h2 class="fw-bold mb-1"><i class="bi bi-mortarboard text-primary me-2"></i>GPA Calculator</h2>
    <p class="text-muted mb-4">Calculate your cumulative GPA by adding your courses below.</p>

    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <div id="courseList">
          <div class="course-row row g-2 mb-2 align-items-end">
            <div class="col-md-5">
              <label class="form-label fw-semibold">Course Name</label>
              <input type="text" class="form-control course-name" placeholder="e.g. Calculus I" />
            </div>
            <div class="col-md-3">
              <label class="form-label fw-semibold">Credit Hours</label>
              <input type="number" class="form-control course-credits" min="1" max="6" value="3" />
            </div>
            <div class="col-md-3">
              <label class="form-label fw-semibold">Grade</label>
              <select class="form-select course-grade">
                <option value="4.0">A (4.0)</option>
                <option value="3.7">A- (3.7)</option>
                <option value="3.3">B+ (3.3)</option>
                <option value="3.0">B (3.0)</option>
                <option value="2.7">B- (2.7)</option>
                <option value="2.3">C+ (2.3)</option>
                <option value="2.0">C (2.0)</option>
                <option value="1.7">C- (1.7)</option>
                <option value="1.3">D+ (1.3)</option>
                <option value="1.0">D (1.0)</option>
                <option value="0.0">F (0.0)</option>
              </select>
            </div>
            <div class="col-md-1">
              <button class="btn btn-outline-danger remove-course w-100" title="Remove">
                <i class="bi bi-trash"></i>
              </button>
            </div>
          </div>
        </div>
        <button id="addCourse" class="btn btn-outline-primary mt-2">
          <i class="bi bi-plus-circle me-1"></i>Add Course
        </button>

        <hr class="my-4" />

        <div class="d-grid">
          <button id="calculateGPA" class="btn btn-primary btn-lg">
            <i class="bi bi-calculator me-2"></i>Calculate GPA
          </button>
        </div>

        <div id="gpaResult" class="mt-4 d-none">
          <div class="alert alert-success text-center">
            <h4 class="mb-1">Your Cumulative GPA</h4>
            <p class="display-4 fw-bold mb-1" id="gpaValue">0.00</p>
            <p class="mb-0 text-muted" id="gpaDetails"></p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const gradeTemplate = `
<div class="course-row row g-2 mb-2 align-items-end">
  <div class="col-md-5">
    <input type="text" class="form-control course-name" placeholder="e.g. Calculus I" />
  </div>
  <div class="col-md-3">
    <input type="number" class="form-control course-credits" min="1" max="6" value="3" />
  </div>
  <div class="col-md-3">
    <select class="form-select course-grade">
      <option value="4.0">A (4.0)</option>
      <option value="3.7">A- (3.7)</option>
      <option value="3.3">B+ (3.3)</option>
      <option value="3.0">B (3.0)</option>
      <option value="2.7">B- (2.7)</option>
      <option value="2.3">C+ (2.3)</option>
      <option value="2.0">C (2.0)</option>
      <option value="1.7">C- (1.7)</option>
      <option value="1.3">D+ (1.3)</option>
      <option value="1.0">D (1.0)</option>
      <option value="0.0">F (0.0)</option>
    </select>
  </div>
  <div class="col-md-1">
    <button class="btn btn-outline-danger remove-course w-100" title="Remove">
      <i class="bi bi-trash"></i>
    </button>
  </div>
</div>`;

document.getElementById('addCourse').addEventListener('click', () => {
  document.getElementById('courseList').insertAdjacentHTML('beforeend', gradeTemplate);
});

document.getElementById('courseList').addEventListener('click', (e) => {
  if (e.target.closest('.remove-course')) {
    const rows = document.querySelectorAll('.course-row');
    if (rows.length > 1) e.target.closest('.course-row').remove();
  }
});

document.getElementById('calculateGPA').addEventListener('click', () => {
  let totalPoints = 0, totalCredits = 0;
  document.querySelectorAll('.course-row').forEach(row => {
    const credits = parseFloat(row.querySelector('.course-credits').value) || 0;
    const grade = parseFloat(row.querySelector('.course-grade').value) || 0;
    totalPoints += credits * grade;
    totalCredits += credits;
  });
  const gpa = totalCredits > 0 ? (totalPoints / totalCredits).toFixed(2) : '0.00';
  document.getElementById('gpaValue').textContent = gpa;
  document.getElementById('gpaDetails').textContent = `Total Credits: ${totalCredits} | Quality Points: ${totalPoints.toFixed(2)}`;
  document.getElementById('gpaResult').classList.remove('d-none');
});
</script>
{% endblock %}

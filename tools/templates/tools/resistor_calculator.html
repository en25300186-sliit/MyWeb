{% extends 'base.html' %}
{% block title %}Resistor Calculator – EngiHub{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <h2 class="fw-bold mb-1"><i class="bi bi-cpu text-primary me-2"></i>Resistor Color Code Calculator</h2>
    <p class="text-muted mb-4">Select the 4 color bands to decode a resistor's value.</p>

    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <!-- Resistor visual -->
        <div class="resistor-diagram text-center mb-4">
          <svg width="300" height="60" viewBox="0 0 300 60">
            <line x1="0" y1="30" x2="55" y2="30" stroke="#888" stroke-width="3"/>
            <rect x="55" y="15" width="190" height="30" rx="10" fill="#d4a84b" stroke="#b8860b" stroke-width="2"/>
            <rect id="band1" x="75" y="15" width="18" height="30" rx="3" fill="#000"/>
            <rect id="band2" x="105" y="15" width="18" height="30" rx="3" fill="#8B4513"/>
            <rect id="band3" x="135" y="15" width="18" height="30" rx="3" fill="#f00"/>
            <rect id="band4" x="200" y="15" width="18" height="30" rx="3" fill="#ffd700"/>
            <line x1="245" y1="30" x2="300" y2="30" stroke="#888" stroke-width="3"/>
          </svg>
        </div>

        <div class="row g-3 mb-4">
          <div class="col-6 col-md-3">
            <label class="form-label fw-semibold">Band 1 (1st digit)</label>
            <select id="b1" class="form-select band-select" onchange="updateBand('band1', this.value)">
              <option value="0" data-color="#000">Black (0)</option>
              <option value="1" data-color="#8B4513" selected>Brown (1)</option>
              <option value="2" data-color="#f00">Red (2)</option>
              <option value="3" data-color="#ff8c00">Orange (3)</option>
              <option value="4" data-color="#ffd700">Yellow (4)</option>
              <option value="5" data-color="#008000">Green (5)</option>
              <option value="6" data-color="#00f">Blue (6)</option>
              <option value="7" data-color="#8a2be2">Violet (7)</option>
              <option value="8" data-color="#808080">Grey (8)</option>
              <option value="9" data-color="#fff">White (9)</option>
            </select>
          </div>
          <div class="col-6 col-md-3">
            <label class="form-label fw-semibold">Band 2 (2nd digit)</label>
            <select id="b2" class="form-select band-select" onchange="updateBand('band2', this.value)">
              <option value="0" data-color="#000">Black (0)</option>
              <option value="1" data-color="#8B4513">Brown (1)</option>
              <option value="2" data-color="#f00" selected>Red (2)</option>
              <option value="3" data-color="#ff8c00">Orange (3)</option>
              <option value="4" data-color="#ffd700">Yellow (4)</option>
              <option value="5" data-color="#008000">Green (5)</option>
              <option value="6" data-color="#00f">Blue (6)</option>
              <option value="7" data-color="#8a2be2">Violet (7)</option>
              <option value="8" data-color="#808080">Grey (8)</option>
              <option value="9" data-color="#fff">White (9)</option>
            </select>
          </div>
          <div class="col-6 col-md-3">
            <label class="form-label fw-semibold">Band 3 (multiplier)</label>
            <select id="b3" class="form-select band-select" onchange="updateBand('band3', this.value)">
              <option value="1" data-color="#000">Black (×1)</option>
              <option value="10" data-color="#8B4513">Brown (×10)</option>
              <option value="100" data-color="#f00" selected>Red (×100)</option>
              <option value="1000" data-color="#ff8c00">Orange (×1K)</option>
              <option value="10000" data-color="#ffd700">Yellow (×10K)</option>
              <option value="100000" data-color="#008000">Green (×100K)</option>
              <option value="1000000" data-color="#00f">Blue (×1M)</option>
              <option value="0.1" data-color="#ffc0cb">Gold (×0.1)</option>
              <option value="0.01" data-color="#c0c0c0">Silver (×0.01)</option>
            </select>
          </div>
          <div class="col-6 col-md-3">
            <label class="form-label fw-semibold">Band 4 (tolerance)</label>
            <select id="b4" class="form-select band-select" onchange="updateBand('band4', this.value)">
              <option value="1" data-color="#8B4513">Brown (±1%)</option>
              <option value="2" data-color="#f00">Red (±2%)</option>
              <option value="0.5" data-color="#008000">Green (±0.5%)</option>
              <option value="0.25" data-color="#00f">Blue (±0.25%)</option>
              <option value="0.1" data-color="#8a2be2">Violet (±0.1%)</option>
              <option value="5" data-color="#ffd700" selected>Gold (±5%)</option>
              <option value="10" data-color="#c0c0c0">Silver (±10%)</option>
            </select>
          </div>
        </div>

        <div class="d-grid mb-3">
          <button onclick="calculateResistor()" class="btn btn-primary btn-lg">
            <i class="bi bi-calculator me-2"></i>Calculate
          </button>
        </div>

        <div id="resistorResult" class="alert alert-info text-center d-none">
          <h5 class="mb-1">Resistance Value</h5>
          <p class="display-6 fw-bold mb-1" id="resistorValue"></p>
          <p class="mb-0" id="resistorTolerance"></p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const bandColors = {
  'band1': {'0':'#000','1':'#8B4513','2':'#f00','3':'#ff8c00','4':'#ffd700','5':'#008000','6':'#00f','7':'#8a2be2','8':'#808080','9':'#fff'},
  'band2': {'0':'#000','1':'#8B4513','2':'#f00','3':'#ff8c00','4':'#ffd700','5':'#008000','6':'#00f','7':'#8a2be2','8':'#808080','9':'#fff'},
  'band3': {'1':'#000','10':'#8B4513','100':'#f00','1000':'#ff8c00','10000':'#ffd700','100000':'#008000','1000000':'#00f','0.1':'#ffc0cb','0.01':'#c0c0c0'},
  'band4': {'1':'#8B4513','2':'#f00','0.5':'#008000','0.25':'#00f','0.1':'#8a2be2','5':'#ffd700','10':'#c0c0c0'},
};

function updateBand(bandId, value) {
  const colorMap = bandColors[bandId];
  const color = colorMap[value] || '#000';
  document.getElementById(bandId).setAttribute('fill', color);
}

function formatResistance(ohms) {
  if (ohms >= 1e6) return (ohms / 1e6).toFixed(2) + ' MΩ';
  if (ohms >= 1e3) return (ohms / 1e3).toFixed(2) + ' kΩ';
  return ohms.toFixed(2) + ' Ω';
}

function calculateResistor() {
  const d1 = parseInt(document.getElementById('b1').value);
  const d2 = parseInt(document.getElementById('b2').value);
  const mult = parseFloat(document.getElementById('b3').value);
  const tol = parseFloat(document.getElementById('b4').value);
  const resistance = (d1 * 10 + d2) * mult;
  document.getElementById('resistorValue').textContent = formatResistance(resistance);
  document.getElementById('resistorTolerance').textContent = `Tolerance: ±${tol}%`;
  document.getElementById('resistorResult').classList.remove('d-none');
}

// Initialize band colors on page load
document.addEventListener('DOMContentLoaded', () => {
  updateBand('band1', document.getElementById('b1').value);
  updateBand('band2', document.getElementById('b2').value);
  updateBand('band3', document.getElementById('b3').value);
  updateBand('band4', document.getElementById('b4').value);
  calculateResistor();
});
</script>
{% endblock %}
